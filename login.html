<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Muda Bakti RT 8 RW 11</title>
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #00f0ff;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            width: 300px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #00f0ff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #ff00ff;
            color: #fff;
        }

        .error {
            color: red;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login Admin</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p class="error" id="errorMsg"></p>
        </form>
    </div>

    <script>
        const adminUser = "admin";
        const adminPass = "12345"; // contoh password, nanti bisa diganti lebih aman

        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            if (user === adminUser && pass === adminPass) {
                window.location.href = "admin.html"; // arahkan ke halaman admin
            } else {
                document.getElementById("errorMsg").textContent = "Username atau password salah!";
            }
        });
    </script>
</body>

</html>
