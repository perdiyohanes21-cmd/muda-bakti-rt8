<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Muda Bakti RT 8 RW 11</title>
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 20px;
        }

        h1 {
            color: #00f0ff;
            text-shadow: 0 0 10px #00f0ff;
        }

        .form-box,
        .data-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #00f0ff;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        input,
        select,
        button {
            margin: 5px 0;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            background: #00f0ff;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff00ff;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-top: 15px;
        }

        th,
        td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
            word-wrap: break-word;
        }

        th {
            background: #111;
            color: #00f0ff;
        }

        #logout {
            background: #ff00ff;
            color: #fff;
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px #ff00ff;
            transition: 0.3s;
        }

        #logout:hover {
            background: #00f0ff;
            color: #0d0d0d;
            box-shadow: 0 0 20px #ff00ff;
        }

        .kegiatan-item {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #00f0ff;
            border-radius: 8px;
            background: #111;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .kegiatan-item img {
            max-width: 200px;
            display: block;
            margin: 10px auto;
            border-radius: 6px;
            box-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>

<body>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Panel Admin</h1>
        <button id="logout">Logout</button>
    </div>

    <!-- Form Tambah Warga -->
    <div class="form-box">
        <h2>Tambah Warga</h2>
        <form id="formWarga">
            <input type="text" id="nama" placeholder="Nama" required>
            <input type="number" id="umur" placeholder="Umur" required>
            <select id="jk">
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
            <button type="submit">Tambah</button>
        </form>
    </div>

    <!-- Form Tambah Kegiatan -->
    <div class="form-box">
        <h2>Tambah Kegiatan</h2>
        <form id="formKegiatan">
            <input type="text" id="kegiatan" placeholder="Nama Kegiatan" required>
            <input type="file" id="fotoKegiatan" accept="image/*" required>
            <button type="submit">Tambah</button>
        </form>
    </div>

    <!-- Data Warga -->
    <div class="data-box">
        <h2>Data Warga</h2>
        <table id="tabelWarga">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nama</th>
                    <th>Umur</th>
                    <th>Jenis Kelamin</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Data Kegiatan -->
    <div class="data-box">
        <h2>Data Kegiatan</h2>
        <div id="listKegiatan"></div>
    </div>

    <script>
        // Tombol Logout
        document.getElementById("logout").addEventListener("click", () => {
            window.location.href = "index.html";
        });

        // Tambah Warga
        document.getElementById("formWarga").addEventListener("submit", e => {
            e.preventDefault();
            const nama = document.getElementById("nama").value;
            const umur = parseInt(document.getElementById("umur").value);
            const jk = document.getElementById("jk").value;

            let warga = JSON.parse(localStorage.getItem("warga")) || [];
            const id = Date.now() + "_" + warga.length;
            warga.push({ id, nama, umur, jk });
            localStorage.setItem("warga", JSON.stringify(warga));

            tampilWarga();
            e.target.reset();
        });

        // Tambah Kegiatan dengan Foto
        document.getElementById("formKegiatan").addEventListener("submit", e => {
            e.preventDefault();
            const kegiatan = document.getElementById("kegiatan").value;
            const fileInput = document.getElementById("fotoKegiatan");
            const file = fileInput.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    let kegiatanList = JSON.parse(localStorage.getItem("kegiatan")) || [];
                    kegiatanList.push({ nama: kegiatan, foto: event.target.result });
                    localStorage.setItem("kegiatan", JSON.stringify(kegiatanList));
                    tampilKegiatan();
                };
                reader.readAsDataURL(file);
            }

            e.target.reset();
        });

        // Tampilkan Warga
        function tampilWarga() {
            const warga = JSON.parse(localStorage.getItem("warga")) || [];
            const tbody = document.querySelector("#tabelWarga tbody");
            tbody.innerHTML = "";
            warga.forEach((w, index) => {
                let row = `<tr>
          <td>${w.id}</td>
          <td contenteditable="true" onblur="editWarga(${index}, 'nama', this.innerText)">${w.nama}</td>
          <td contenteditable="true" onblur="editWarga(${index}, 'umur', this.innerText)">${w.umur}</td>
          <td contenteditable="true" onblur="editWarga(${index}, 'jk', this.innerText)">${w.jk}</td>
          <td><button onclick="hapusWarga(${index})">Hapus</button></td>
        </tr>`;
                tbody.innerHTML += row;
            });
        }

        function editWarga(index, field, value) {
            let warga = JSON.parse(localStorage.getItem("warga")) || [];
            warga[index][field] = field === "umur" ? parseInt(value) : value;
            localStorage.setItem("warga", JSON.stringify(warga));
            tampilWarga();
        }

        function hapusWarga(index) {
            let warga = JSON.parse(localStorage.getItem("warga")) || [];
            warga.splice(index, 1);
            localStorage.setItem("warga", JSON.stringify(warga));
            tampilWarga();
        }

        // Tampilkan Kegiatan
        function tampilKegiatan() {
            const kegiatanList = JSON.parse(localStorage.getItem("kegiatan")) || [];
            const list = document.getElementById("listKegiatan");
            list.innerHTML = "";
            kegiatanList.forEach((k, index) => {
                let div = document.createElement("div");
                div.className = "kegiatan-item";
                div.innerHTML = `
          <p>${k.nama}</p>
          <img src="${k.foto}" alt="${k.nama}">
          <button onclick="hapusKegiatan(${index})">Hapus</button>
        `;
                list.appendChild(div);
            });
        }

        function hapusKegiatan(index) {
            let kegiatanList = JSON.parse(localStorage.getItem("kegiatan")) || [];
            kegiatanList.splice(index, 1);
            localStorage.setItem("kegiatan", JSON.stringify(kegiatanList));
            tampilKegiatan();
        }

        // Load data saat halaman dibuka
        tampilWarga();
        tampilKegiatan();
    </script>
</body>

</html>
